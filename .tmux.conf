#### --- GENERAL SETTINGS ---
set -g mouse on
set -g history-limit 50000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g default-terminal "screen-256color"
set -as terminal-features ",xterm-256color:RGB"

#### --- PREFIX KEY (EASIER ACCESS) ---
set -g prefix C-a
unbind C-b
bind C-a send-prefix

#### --- WINDOW NAVIGATION (TAB-LIKE BEHAVIOR) ---
bind -n C-Tab next-window
bind -n C-S-Tab previous-window

bind -n M-1 select-window -t 1           # Alt+1 → window 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

#### --- QUICK WINDOW MANAGEMENT ---
bind c new-window
bind x kill-window
bind , command-prompt "rename-window %%"

#### --- FAST WINDOW SWITCHING MENU ---
bind w choose-window

#### --- SPLIT PANES (OPTIONAL BUT USEFUL) ---
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

#### --- SMARTER LOOK ---
set -g status on
set -g status-position top

set -g status-left " tmux "
set -g status-right " %Y-%m-%d %H:%M "

setw -g window-status-format " #I:#W: #(tmux display-message -p -F '#{pane_current_command}') "
setw -g window-status-current-format "#[bg=cyan] #I:#W: #(tmux display-message -p -F '#{pane_current_command}') #[default]"

#### --- PLUGINS ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

run '~/.tmux/plugins/tpm/tpm'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'
